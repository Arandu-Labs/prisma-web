<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Email Verificado - Prisma Noticias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 80px 20px;
            background-color: #0B0E14;
            color: #FFFFFF;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        .container {
            max-width: 480px;
            background-color: #161B22;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            border: 1px solid #30363D;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }
        h2 {
            margin: 0 0 16px 0;
            color: #FFC107;
            font-size: 28px;
        }
        p {
            color: #8B949E;
            font-size: 16px;
            line-height: 1.6;
            margin: 0 0 32px 0;
        }
        .btn {
            display: inline-block;
            padding: 14px 28px;
            background-color: #FFC107;
            color: #0B0E14;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: background-color 0.2s, transform 0.2s;
        }
        .btn:hover {
            background-color: #FFA000;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="assets/images/prisma_logo.png" alt="Prisma Noticias Logo">
        <h2>¡Email Verificado!</h2>
        <p>Redirigiéndote de vuelta a Prisma Noticias...</p>
        
        <!-- Botón de respaldo en caso de que falle la redirección automática -->
        <a href="prisma://open" class="btn">Abrir la Aplicación</a>
    </div>

    <script>
        // Intentar abrir la app inmediatamente usando tu esquema personalizado
        window.location.href = "prisma://open";
        // Redirección de respaldo por si el usuario no tiene la app instalada
        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=dev.arandulabs.prisma&pli=1";
        }, 2500);
    </script>
</body>
</html>
