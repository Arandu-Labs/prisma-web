<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Abriendo FirmApp...</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            background-color: #f9f9f9;
            color: #333;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            margin-top: 20px;
            background-color: #7B1FA2; /* Color de tu app */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h2>¡Email Verificado!</h2>
    <p>Redirigiéndote de vuelta a FirmApp...</p>
    
    <!-- Botón de respaldo en caso de que falle la redirección automática -->
    <a href="firmapp://open" class="btn">Abrir la Aplicación</a>
    <script>
        // Intentar abrir la app inmediatamente usando tu esquema personalizado
        window.location.href = "firmapp://open";
        // Redirección de respaldo por si el usuario no tiene la app instalada
        setTimeout(function() {
            // Reemplaza esto por la URL real de tu Google Play Store
            window.location.href = "https://play.google.com/store/apps/details?id=dev.arandulabs.firmapp&pli=1";
        }, 2500);
    </script>
</body>
</html>
