<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FirmApp - Invitación de Referido</title>
  <style>
    body {
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #0b0f19;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 24px;
      padding: 40px;
      max-width: 400px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      backdrop-filter: blur(8px);
    }
    .spinner {
      border: 4px solid rgba(255, 255, 255, 0.1);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border-left-color: #00e676;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    h1 {
      font-size: 22px;
      margin-bottom: 10px;
    }
    p {
      color: #8a99ad;
      font-size: 14px;
    }
  </style>
  <script>
    window.onload = function() {
      // Obtener el parámetro 'ref' de la URL actual
      const urlParams = new URLSearchParams(window.location.search);
      const ref = urlParams.get('ref') || '';
      
      // Enlace de la prueba cerrada de Google Play
      const playStoreUrl = 'https://play.google.com/apps/testing/dev.arandulabs.firmapp';
      
      // Redirigir al usuario al enlace de prueba cerrada de Google Play después de un breve delay
      setTimeout(function() {
        window.location.href = playStoreUrl;
      }, 1000);
    };
  </script>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>FirmApp</h1>
    <p>Procesando invitación de referido...</p>
    <p style="font-size: 12px; color: #4b5563;">Redirigiendo de forma segura a Google Play...</p>
  </div>
</body>
</html>
